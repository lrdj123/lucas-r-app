<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="color-scheme" content="light">
    {% block og %}
    <meta property="og:title" content="VoiceMail - Chat Privado por E-mail">
    <meta property="og:description" content="Converse com quem você quiser usando apenas o e-mail. Privado, seguro e sem número de telefone.">
    <meta property="og:image" content="https://lucasrapp-5vjo8csu.b4a.run/static/og-image.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://lucasrapp-5vjo8csu.b4a.run">
    {% endblock %}
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <link rel="shortcut icon" href="/static/favicon.ico">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="VoiceMail">
    <link rel="apple-touch-icon" href="/static/icon-192.png">
    <script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/static/sw.js');
    }
    </script>
    <title>{% block title %}VoiceMail{% endblock %}</title>
    <style>
        :root {
            --green-dark: #1a3c34;
            --green-light: #2d6a4f;
            --gold: #c9a84c;
            --cream: #faf8f0;
            --shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--cream);
            color: #333;
            user-select: none;
            -webkit-user-select: none;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .container { max-width: 1000px; margin: 0 auto; padding: 0 15px; width: 100%; }
        header {
            background: var(--green-dark);
            padding: 12px 0;
        }
        .header-inner {
            max-width: 1000px; margin: 0 auto; padding: 0 15px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo {
            color: white; text-decoration: none; font-size: 1.3em;
        }
        .logo span { color: var(--gold); }
        nav a {
            color: white; text-decoration: none; margin-left: 12px;
            padding: 6px 14px; border-radius: 6px; font-size: 0.9em;
        }
        nav a:hover { background: rgba(255,255,255,0.15); }
        .card {
            background: white; border-radius: 12px; box-shadow: var(--shadow);
        }
        .btn {
            display: inline-block; padding: 8px 20px; border-radius: 8px;
            text-decoration: none; border: none; cursor: pointer;
            font-size: 0.95em; font-weight: 500;
        }
        .btn-primary {
            background: var(--gold); color: var(--green-dark);
        }
        .btn-primary:hover { background: #b8973a; }
        .btn-danger {
            background: #e74c3c; color: white;
        }
        .btn-danger:hover { background: #c0392b; }
        main { flex: 1; }
        footer {
            background: var(--green-dark); color: var(--cream);
            text-align: center; padding: 12px; margin-top: auto;
        }
        footer p { opacity: 0.7; font-size: 0.8em; }
        .input-field {
            width: 100%; padding: 12px; border: 2px solid #ddd;
            border-radius: 8px; font-size: 1em; outline: none;
            transition: border 0.2s;
        }
        .input-field:focus { border-color: var(--gold); }
        @media (max-width: 768px) {
            .header-inner { gap: 8px; }
            nav a { margin: 0 4px; font-size: 0.8em; padding: 5px 10px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-inner">
            <a href="/" class="logo">🎙️ Voice<span>Mail</span></a>
            <nav>
                {% if session.email %}
                    <span style="color:rgba(255,255,255,0.7);font-size:0.85em;">{{ session.apelido }}</span>
                    <a href="{{ url_for('config') }}">⚙️</a>
                    <a href="{{ url_for('sair') }}">🚪 Sair</a>
                {% endif %}
            </nav>
        </div>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>🎙️ VoiceMail &copy; 2026 — <span style="opacity:0.5;">Lucas R</span></p>
    </footer>
</body>
</html>
