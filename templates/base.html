<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="color-scheme" content="light">
    {% block og %}
    <meta property="og:title" content="VoiceMail - Chat Privado por E-mail">
    <meta property="og:description" content="Converse com quem você quiser usando apenas o e-mail. Privado, seguro e sem número de telefone.">
    <meta property="og:image" content="https://lucasrapp-5vjo8csu.b4a.run/static/og-image.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://lucasrapp-5vjo8csu.b4a.run">
    {% endblock %}
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <link rel="shortcut icon" href="/static/favicon.ico">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="VoiceMail">
    <link rel="apple-touch-icon" href="/static/icon-192.png">
    <script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/static/sw.js');
    }
    </script>
    <title>{% block title %}VoiceMail{% endblock %}</title>
    <style>
        :root {
            --green-dark: #1a3c34;
            --green-light: #2d6a4f;
            --gold: #c9a84c;
            --cream: #faf8f0;
            --shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            {% if meu_fundo and meu_fundo != 'default' and meu_fundo != 'none' %}
                background: var(--cream);
                background-image: url('/fundos/{{ meu_fundo }}');
                background-size: cover;
                background-attachment: fixed;
                background-position: center;
            {% else %}
                {% set fundos_cores = {
                    'default': 'var(--cream)',
                    'verde_escuro': '#1a3c34',
                    'lilas': '#f3e5f5',
                    'areia': '#fff3e0',
                    'gelo': '#f5f5f5',
                    'azul': '#e3f2fd',
                    'escuro': '#2c3e50'
                } %}
                background: {{ fundos_cores.get(meu_fundo, 'var(--cream)') }};
            {% endif %}
            color: #333;
            user-select: none;
            -webkit-user-select: none;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .container { max-width: 1000px; margin: 0 auto; padding: 0 15px; width: 100%; }
        header {
            background: var(--green-dark);
            padding: 12px 0;
        }
        .header-inner {
            max-width: 1000px; margin: 0 auto; padding: 0 15px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo {
            color: white; text-decoration: none; font-size: 1.3em;
        }
        .logo span { color: var(--gold); }
        nav a {
            color: white; text-decoration: none; margin-left: 12px;
            padding: 6px 14px; border-radius: 6px; font-size: 0.9em;
        }
        nav a:hover { background: rgba(255,255,255,0.15); }
        .card {
            background: white; border-radius: 12px; box-shadow: var(--shadow);
        }
        .btn {
            display: inline-block; padding: 8px 20px; border-radius: 8px;
            text-decoration: none; border: none; cursor: pointer;
            font-size: 0.95em; font-weight: 500;
        }
        .btn-primary {
            background: var(--gold); color: var(--green-dark);
        }
        .btn-primary:hover { background: #b8973a; }
        .btn-danger {
            background: #e74c3c; color: white;
        }
        .btn-danger:hover { background: #c0392b; }
        main { flex: 1; }
        footer {
            background: var(--green-dark); color: var(--cream);
            text-align: center; padding: 12px; margin-top: auto;
        }
        footer p { opacity: 0.7; font-size: 0.8em; }
        .input-field {
            width: 100%; padding: 12px; border: 2px solid #ddd;
            border-radius: 8px; font-size: 1em; outline: none;
            transition: border 0.2s;
        }
        .input-field:focus { border-color: var(--gold); }
        @media (max-width: 768px) {
            .header-inner { gap: 8px; }
            nav a { margin: 0 4px; font-size: 0.8em; padding: 5px 10px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-inner">
            <a href="/" class="logo">🎙️ Voice<span>Mail</span></a>
            <nav>
                {% if session.email %}
                    <a href="{{ url_for('config') }}" style="display:flex;align-items:center;gap:8px;text-decoration:none;">
                        {% if minha_foto %}
                            <img src="/perfil/{{ minha_foto }}" style="width:32px;height:32px;border-radius:50%;object-fit:cover;border:1px solid var(--gold);">
                        {% else %}
                            <div style="width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.1);color:var(--gold);display:flex;align-items:center;justify-content:center;font-size:0.8em;border:1px solid rgba(255,255,255,0.2);">👤</div>
                        {% endif %}
                        <span style="color:rgba(255,255,255,0.9);font-size:0.85em;font-weight:bold;">{{ session.apelido }}</span>
                    </a>
                    <a href="{{ url_for('sair') }}" style="margin-left:10px;opacity:0.7;font-size:0.8em;">🚪 Sair</a>
                {% endif %}
            </nav>
        </div>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>🎙️ VoiceMail &copy; 2026 — <span style="opacity:0.5;">Lucas R</span></p>
    </footer>
</body>
</html>
