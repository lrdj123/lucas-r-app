{% extends "base.html" %}
{% block title %}Sala {{ codigo }}{% endblock %}
{% block content %}
<style>
    @media print { body { display: none !important; } }
    .chat-area { max-width: 700px; margin: 0 auto; padding: 0 10px; }
    #messages {
        height: 60vh;
        overflow-y: auto;
        padding: 15px;
        background: white;
        border-radius: 12px;
        box-shadow: var(--shadow);
        margin-bottom: 15px;
        user-select: none;
        -webkit-user-select: none;
    }
    #messages::-webkit-scrollbar { width: 6px; }
    #messages::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 3px; }
    .msg-sistema { color: #999; font-style: italic; font-size: 0.85em; margin: 8px 0; text-align: center; }
    .msg-usuario { margin: 6px 0; padding: 8px 12px; border-radius: 8px; background: #f5f5f5; position: relative; }
    .msg-usuario .apelido { color: var(--green-dark); font-weight: bold; font-size: 0.85em; }
    .msg-usuario .texto { font-size: 1.1em; margin-top: 3px; }
    .btn-apagar {
        position: absolute; top: 4px; right: 8px; cursor: pointer;
        font-size: 0.8em; opacity: 0.3; transition: opacity 0.2s;
        user-select: none; -webkit-user-select: none;
    }
    .btn-apagar:hover { opacity: 1; }
    .input-area { display: flex; gap: 8px; align-items: center; }
    .input-area input[type="text"] { flex: 1; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 1em; }
    .input-area button { padding: 12px 20px; white-space: nowrap; }
    .btn-midia {
        background: none; border: 2px solid #ddd; border-radius: 8px;
        padding: 10px 12px; font-size: 1.2em; cursor: pointer;
        transition: all 0.2s; line-height: 1;
    }
    .btn-midia:hover { border-color: var(--gold); background: #fff8e7; }
    .btn-audio {
        background: none; border: 2px solid #ddd; border-radius: 50%;
        padding: 10px 12px; font-size: 1.2em; cursor: pointer;
        transition: all 0.2s; line-height: 1; width: 44px; height: 44px;
        text-align: center;
    }
    .btn-audio:hover { border-color: var(--gold); background: #fff8e7; }
    .btn-audio.gravando {
        border-color: #e74c3c; background: #ffeaea;
        animation: pulse-mic 1s infinite;
    }
    @keyframes pulse-mic {
        0%, 100% { box-shadow: 0 0 0 0 rgba(231,76,60,0.4); }
        50% { box-shadow: 0 0 0 10px rgba(231,76,60,0); }
    }
    .gravando-texto { color: #e74c3c; font-size: 0.8em; font-weight: bold; }
    #fileInput { display: none; }
    .msg-midia {
        margin: 6px 0; padding: 8px 12px; border-radius: 8px;
        background: #f5f5f5; position: relative;
    }
    .msg-midia .apelido { color: var(--green-dark); font-weight: bold; font-size: 0.85em; }
    .msg-midia img, .msg-midia video {
        max-width: 100%; max-height: 300px; border-radius: 8px; margin-top: 5px; cursor: pointer;
    }
    .msg-midia audio { width: 100%; margin-top: 5px; }
    .msg-midia .arquivo-link {
        display: inline-block; margin-top: 5px; padding: 6px 12px;
        background: var(--green-dark); color: white; border-radius: 6px;
        text-decoration: none; font-size: 0.9em;
    }
    .msg-midia .arquivo-link:hover { opacity: 0.85; }
    .upload-status {
        font-size: 0.8em; color: #666; text-align: center; padding: 4px;
    }
    .codigo-box {
        text-align: center; padding: 15px; margin-bottom: 20px;
        background: var(--green-dark); color: white; border-radius: 12px;
    }
    .codigo-box .codigo { font-size: 1.8em; font-weight: bold; letter-spacing: 4px; color: var(--gold); }
    #status { text-align: center; padding: 5px; font-size: 0.8em; color: #666; }
    .conectado { color: #2d6a4f !important; }
    .erro { color: #d32f2f !important; }
</style>

<div class="hero" style="padding:30px 20px;">
    <h1>💬 Sala <span>{{ codigo }}</span></h1>
    <p>Convide alguém com este código 👇</p>
</div>

<div class="codigo-box">
    <p style="opacity:0.8;margin-bottom:5px;">📋 Código da Sala:</p>
    <div class="codigo">{{ codigo }}</div>
</div>

<div class="chat-area">
    <div id="status">⏳ Conectando...</div>
    <div id="messages"></div>
    <div id="uploadStatus" class="upload-status"></div>
    <div class="input-area">
        <button class="btn-midia" id="midiaBtn" title="Enviar mídia">📎</button>
        <button class="btn-audio" id="audioBtn" title="Gravar áudio">🎙️</button>
        <input type="file" id="fileInput" accept="image/*,video/*,audio/*,.pdf,.doc,.docx,.txt">
        <input type="text" id="msgInput" placeholder="Digite sua mensagem..." autocomplete="off">
        <button class="btn btn-primary" id="sendBtn">Enviar ➤</button>
    </div>
    <p style="text-align:center;font-size:0.75em;color:#999;margin-top:10px;">
        🚫 Anti-print ativo | 📵 Conversa some ao fechar | 👤 {{ email }}
    </p>
</div>

<!-- CORREÇÃO: Usar CDN do Socket.IO como fallback -->
<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
<script>
    const codigo = '{{ codigo }}';
    const apelido = '{{ email.split("@")[0] }}';
    const statusDiv = document.getElementById('status');
    
    // CORREÇÃO: Configuração robusta de conexão
    const socket = io({
        transports: ['websocket', 'polling'],
        upgrade: true,
        rememberUpgrade: true
    });
    
    // Debug no console
    console.log('Tentando conectar ao Socket.IO...');

    // Bloqueios de segurança
    document.addEventListener('keydown', function(e) {
        if (e.key === 'PrintScreen' || 
            (e.ctrlKey && e.key === 'p') ||
            (e.metaKey && e.shiftKey && ['p','i','j'].includes(e.key))) {
            e.preventDefault();
            return false;
        }
    });
    document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
    document.addEventListener('copy', function(e) { e.preventDefault(); });
    document.addEventListener('cut', function(e) { e.preventDefault(); });

    // Conexão estabelecida
    socket.on('connect', function() {
        console.log('Conectado! ID:', socket.id);
        statusDiv.textContent = '✅ Conectado';
        statusDiv.className = 'conectado';
        
        // Envia dados da sala e apelido
        socket.emit('entrar', { 
            sala: codigo,
            apelido: apelido
        });
    });

    // Erro de conexão
    socket.on('connect_error', function(error) {
        console.error('Erro de conexão:', error);
        statusDiv.textContent = '❌ Erro de conexão. Recarregue a página.';
        statusDiv.className = 'erro';
    });

    // Receber histórico
    socket.on('historico', function(data) {
        console.log('Histórico recebido:', data);
        const msgs = document.getElementById('messages');
        msgs.innerHTML = '';
        if (data.mensagens && data.mensagens.length > 0) {
            data.mensagens.forEach(function(msg) { adicionarMensagem(msg); });
        }
        msgs.scrollTop = msgs.scrollHeight;
    });

    // Receber mensagem
    socket.on('mensagem', function(data) {
        console.log('Mensagem recebida:', data);
        adicionarMensagem(data);
        document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
    });

    // Desconexão
    socket.on('disconnect', function() {
        console.log('Desconectado');
        statusDiv.textContent = '⚠️ Desconectado';
        statusDiv.className = 'erro';
    });

    function adicionarMensagem(data) {
        const div = document.createElement('div');
        if (data.tipo === 'sistema') {
            div.className = 'msg-sistema';
            div.textContent = data.texto;
        } else if (data.midia) {
            div.className = 'msg-midia';
            const isMine = data.apelido === apelido;
            let html = '<div class="apelido">' + data.apelido + '</div>';
            if (data.texto) html += '<div class="texto">' + data.texto + '</div>';
            
            if (data.midia.tipo === 'imagem') {
                html += '<img src="/uploads/' + data.midia.arquivo + '" onclick="window.open(this.src)" loading="lazy">';
            } else if (data.midia.tipo === 'video') {
                html += '<video controls preload="metadata"><source src="/uploads/' + data.midia.arquivo + '"></video>';
            } else if (data.midia.tipo === 'audio') {
                html += '<audio controls preload="none"><source src="/uploads/' + data.midia.arquivo + '"></audio>';
            } else {
                html += '<a class="arquivo-link" href="/uploads/' + data.midia.arquivo + '" target="_blank">📄 ' + data.midia.arquivo + '</a>';
            }
            html += (isMine ? '<span class="btn-apagar" data-id="' + data.id + '" onclick="apagarMensagem(this)">🗑️</span>' : '');
            div.innerHTML = html;
        } else {
            div.className = 'msg-usuario';
            const isMine = data.apelido === apelido;
            div.innerHTML = '<div class="apelido">' + data.apelido + '</div>' +
                '<div class="texto">' + data.texto + '</div>' +
                (isMine ? '<span class="btn-apagar" data-id="' + data.id + '" onclick="apagarMensagem(this)">🗑️</span>' : '');
        }
        document.getElementById('messages').appendChild(div);
    }

    function apagarMensagem(el) {
        const id = el.getAttribute('data-id');
        if (confirm('Apagar esta mensagem?')) {
            socket.emit('apagar_mensagem', { sala: codigo, id: id, apelido: apelido });
        }
    }

    // Receber confirmação de mensagem apagada
    socket.on('mensagem_apagada', function(data) {
        const msgs = document.getElementById('messages');
        const divs = msgs.children;
        for (let i = 0; i < divs.length; i++) {
            const btn = divs[i].querySelector('.btn-apagar');
            if (btn && btn.getAttribute('data-id') === data.id) {
                divs[i].remove();
                break;
            }
        }
    });

    function enviar() {
        const input = document.getElementById('msgInput');
        const texto = input.value.trim();
        if (texto && socket.connected) {
            socket.emit('mensagem', { 
                texto: texto,
                sala: codigo,
                apelido: apelido
            });
            input.value = '';
        } else if (!socket.connected) {
            alert('Você está desconectado. Recarregue a página.');
        }
    }

    document.getElementById('sendBtn').onclick = enviar;
    document.getElementById('msgInput').onkeydown = function(e) {
        if (e.key === 'Enter') enviar();
    };

    // 🎙️ Gravação de áudio
    let mediaRecorder = null;
    let audioChunks = [];
    let gravando = false;

    document.getElementById('audioBtn').onclick = function() {
        const btn = this;
        if (gravando) {
            // Parar gravação
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
            }
            return;
        }

        // Iniciar gravação
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            alert('Seu navegador não suporta gravação de áudio.');
            return;
        }

        navigator.mediaDevices.getUserMedia({ audio: true })
            .then(stream => {
                audioChunks = [];
                mediaRecorder = new MediaRecorder(stream, { mimeType: MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/mp4' });
                
                mediaRecorder.ondataavailable = function(e) {
                    if (e.data.size > 0) audioChunks.push(e.data);
                };

                mediaRecorder.onstop = function() {
                    // Parar as tracks do microfone
                    stream.getTracks().forEach(t => t.stop());

                    const blob = new Blob(audioChunks, { type: mediaRecorder.mimeType });
                    const ext = mediaRecorder.mimeType.includes('webm') ? 'webm' : 'mp4';
                    const file = new File([blob], `audio_${Date.now()}.${ext}`, { type: mediaRecorder.mimeType });

                    const status = document.getElementById('uploadStatus');
                    status.textContent = '📤 Enviando áudio...';

                    const formData = new FormData();
                    formData.append('file', file);

                    fetch('/upload', { method: 'POST', body: formData })
                        .then(r => r.json())
                        .then(data => {
                            if (data.erro) {
                                status.textContent = '❌ ' + data.erro;
                                return;
                            }
                            status.textContent = '';
                            socket.emit('mensagem', {
                                texto: '',
                                sala: codigo,
                                apelido: apelido,
                                midia: data
                            });
                        })
                        .catch(e => {
                            status.textContent = '❌ Erro: ' + e.message;
                        });

                    gravando = false;
                    btn.textContent = '🎙️';
                    btn.className = 'btn-audio';
                };

                mediaRecorder.start();
                gravando = true;
                btn.textContent = '⏹️';
                btn.className = 'btn-audio gravando';
            })
            .catch(e => {
                alert('Não foi possível acessar o microfone: ' + e.message);
            });
    };

    // Upload de mídia
    document.getElementById('midiaBtn').onclick = function() {
        document.getElementById('fileInput').click();
    };

    document.getElementById('fileInput').onchange = function() {
        const file = this.files[0];
        if (!file) return;

        const status = document.getElementById('uploadStatus');
        status.textContent = '📤 Enviando ' + file.name + '...';

        const formData = new FormData();
        formData.append('file', file);

        fetch('/upload', { method: 'POST', body: formData })
            .then(r => r.json())
            .then(data => {
                if (data.erro) {
                    status.textContent = '❌ ' + data.erro;
                    return;
                }
                status.textContent = '';
                socket.emit('mensagem', {
                    texto: '',
                    sala: codigo,
                    apelido: apelido,
                    midia: data
                });
            })
            .catch(e => {
                status.textContent = '❌ Erro ao enviar: ' + e.message;
            });

        this.value = '';
    };
</script>
{% endblock %}
