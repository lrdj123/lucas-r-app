{% extends "base.html" %}
{% block title %}Sala {{ codigo }}{% endblock %}
{% block content %}
<style>
    @media print { body { display: none !important; } }
    .chat-area { max-width: 700px; margin: 0 auto; padding: 0 10px; }
    #messages {
        height: 60vh;
        overflow-y: auto;
        padding: 15px;
        background: white;
        border-radius: 12px;
        box-shadow: var(--shadow);
        margin-bottom: 15px;
        user-select: none;
    }
    .msg-sistema { color: #999; font-style: italic; font-size: 0.85em; margin: 8px 0; text-align: center; }
    .msg-usuario { margin: 6px 0; padding: 8px 12px; border-radius: 8px; background: #f5f5f5; }
    .msg-usuario .apelido { color: var(--green-dark); font-weight: bold; font-size: 0.85em; }
    .msg-usuario .texto { font-size: 1.1em; margin-top: 3px; }
    .input-area { display: flex; gap: 10px; }
    .input-area input { flex: 1; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 1em; }
    .input-area button { padding: 12px 20px; }
    .codigo-box {
        text-align: center; padding: 15px; margin-bottom: 20px;
        background: var(--green-dark); color: white; border-radius: 12px;
    }
    .codigo-box .codigo { font-size: 1.8em; font-weight: bold; letter-spacing: 4px; color: var(--gold); }
    #status { text-align: center; padding: 5px; font-size: 0.8em; }
    .conectado { color: #2d6a4f; }
    .erro { color: #d32f2f; }
</style>

<div class="hero" style="padding:30px 20px;">
    <h1>💬 Sala <span>{{ codigo }}</span></h1>
    <p>Convide alguém com este código 👇</p>
</div>

<div class="codigo-box">
    <p style="opacity:0.8;margin-bottom:5px;">📋 Código da Sala:</p>
    <div class="codigo">{{ codigo }}</div>
</div>

<div class="chat-area">
    <div id="status">⏳ Conectando...</div>
    <div id="messages"></div>
    <div class="input-area">
        <input type="text" id="msgInput" placeholder="Digite sua mensagem..." autocomplete="off">
        <button class="btn btn-primary" id="sendBtn">Enviar ➤</button>
    </div>
</div>

<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
<script>
    const codigo = '{{ codigo }}';
    const apelido = '{{ email.split("@")[0] }}';
    const statusDiv = document.getElementById('status');
    
    // Conexão simples
    const socket = io();
    
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('copy', e => e.preventDefault());

    socket.on('connect', function() {
        statusDiv.textContent = '✅ Conectado';
        statusDiv.className = 'conectado';
        socket.emit('entrar', { sala: codigo, apelido: apelido });
    });

    socket.on('connect_error', function() {
        statusDiv.textContent = '❌ Erro de conexão';
        statusDiv.className = 'erro';
    });

    socket.on('historico', function(data) {
        const msgs = document.getElementById('messages');
        msgs.innerHTML = '';
        if (data.mensagens) {
            data.mensagens.forEach(function(msg) { adicionarMensagem(msg); });
        }
        msgs.scrollTop = msgs.scrollHeight;
    });

    socket.on('mensagem', function(data) {
        adicionarMensagem(data);
        document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
    });

    function adicionarMensagem(data) {
        const div = document.createElement('div');
        if (data.tipo === 'sistema') {
            div.className = 'msg-sistema';
            div.textContent = data.texto;
        } else {
            div.className = 'msg-usuario';
            div.innerHTML = '<div class="apelido">' + data.apelido + '</div><div class="texto">' + data.texto + '</div>';
        }
        document.getElementById('messages').appendChild(div);
    }

    function enviar() {
        const input = document.getElementById('msgInput');
        const texto = input.value.trim();
        if (texto && socket.connected) {
            socket.emit('mensagem', { texto: texto, sala: codigo, apelido: apelido });
            input.value = '';
        }
    }

    document.getElementById('sendBtn').onclick = enviar;
    document.getElementById('msgInput').onkeydown = function(e) {
        if (e.key === 'Enter') enviar();
    };
</script>
{% endblock %}
