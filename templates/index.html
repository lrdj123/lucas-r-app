{% extends "base.html" %}
{% block title %}Entrar{% endblock %}
{% block content %}
<div class="hero">
    <h1>💬 Lucas <span>R</span></h1>
    <p>Chat temporário. Sem rastro. Sem print.</p>
</div>
<div class="card" style="max-width:400px;margin:30px auto;padding:30px;">
    <form action="{{ url_for('entrar') }}" method="POST">
        <label style="display:block;margin-bottom:8px;font-weight:bold;">Seu e-mail</label>
        <p style="font-size:0.85em;color:#999;margin-bottom:12px;">Só pra identificar você na sala</p>
        <input type="email" name="email" required
               style="width:100%;padding:12px;border:2px solid #ddd;border-radius:8px;font-size:1em;margin-bottom:15px;">
        <button type="submit" class="btn btn-primary" style="width:100%;padding:12px;font-size:1.1em;">
            Entrar 🚪
        </button>
    </form>
    <p style="margin-top:15px;font-size:0.85em;color:#999;text-align:center;">
        ⚡ Nada fica salvo. Conversa some quando todos saem.
    </p>
</div>
{% endblock %}
